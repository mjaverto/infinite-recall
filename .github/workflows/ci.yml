name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  swift-build:
    name: Swift build (debug)
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install libwebp (pkg-config dep for CWebP system library)
        run: brew install webp

      - name: Cache SwiftPM artifacts
        uses: actions/cache@v4
        with:
          path: |
            Desktop/.build
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/Developer/Xcode/DerivedData/SourcePackages
          key: swiftpm-${{ runner.os }}-${{ hashFiles('Desktop/Package.swift', 'Desktop/Package.resolved') }}
          restore-keys: |
            swiftpm-${{ runner.os }}-

      - name: swift build
        run: xcrun swift build -c debug --package-path Desktop

  rust-test:
    name: Rust tests (api)
    runs-on: macos-15
    timeout-minutes: 30
    defaults:
      run:
        working-directory: Backend-Rust
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: Backend-Rust -> target

      - name: cargo test -p infinite-recall-api
        run: cargo test --locked -p infinite-recall-api

      - name: cargo test -p infinite-recall-api --features activity_test_wiring
        run: cargo test --locked -p infinite-recall-api --features activity_test_wiring

      - name: cargo test -p infinite-recall-api --features test_introspection
        run: cargo test --locked -p infinite-recall-api --features test_introspection

  python-integration:
    name: Python integration tests
    runs-on: macos-15
    timeout-minutes: 20
    needs: rust-test
    defaults:
      run:
        working-directory: Backend-Rust
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: Backend-Rust -> target

      - name: cargo build -p infinite-recall-api --features test_introspection
        run: cargo build --locked -p infinite-recall-api --features test_introspection

      - name: uv sync && uv run pytest
        working-directory: tests/integration
        run: |
          uv sync
          uv run pytest -v
