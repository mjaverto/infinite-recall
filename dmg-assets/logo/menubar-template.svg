<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 22" role="img" aria-label="Infinite Recall">
  <title>Infinite Recall</title>
  <!-- Pure monochrome template image. Black with alpha; macOS will tint. -->
  <!-- Crossing-X lemniscate centered at (11,11). Path crosses itself at center. -->
  <!-- Stroke width 2.0 (~9% of 22) reads as recognizable infinity at 16px. -->
  <path d="M 11 11
           C 13 8.5, 15 7, 17 7
           C 19.5 7, 20.5 9, 20.5 11
           C 20.5 13, 19.5 15, 17 15
           C 15 15, 13 13.5, 11 11
           C 9 8.5, 7 7, 5 7
           C 2.5 7, 1.5 9, 1.5 11
           C 1.5 13, 2.5 15, 5 15
           C 7 15, 9 13.5, 11 11 Z"
        fill="none"
        stroke="#000000"
        stroke-width="2.0"
        stroke-linecap="round"
        stroke-linejoin="round"/>
</svg>
