<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 22" role="img" aria-label="Infinite Recall">
  <title>Infinite Recall</title>
  <!-- Pure monochrome template image. Black with alpha; macOS will tint. -->
  <!-- Single continuous cubic-bezier infinity path, centered at (11, 11). -->
  <!-- Stroke width 2.4 (~11% of 22) reads at 16px. -->
  <path d="M 11 11
           C 11 8.2, 13.1 6.6, 15.2 6.6
           C 17.6 6.6, 19.3 8.4, 19.3 11
           C 19.3 13.6, 17.6 15.4, 15.2 15.4
           C 13.1 15.4, 11 13.8, 11 11
           C 11 8.2, 8.9 6.6, 6.8 6.6
           C 4.4 6.6, 2.7 8.4, 2.7 11
           C 2.7 13.6, 4.4 15.4, 6.8 15.4
           C 8.9 15.4, 11 13.8, 11 11 Z"
        fill="none"
        stroke="#000000"
        stroke-width="2.4"
        stroke-linecap="round"
        stroke-linejoin="round"/>
</svg>
